# SQL Optimizer 配置 - MySQL 测试
config_version: v1

project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/mapper/**/*.xml

db:
  platform: mysql
  dsn: mysql://<user>:<password>@<host>:<port>/<database>

llm:
  enabled: true
  provider: heuristic
  timeout_ms: 80000

report:
  enabled: true
