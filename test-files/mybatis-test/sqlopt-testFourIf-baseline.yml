config_version: v1

project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/mapper/UserMapper.xml

db:
  platform: mysql
  dsn: mysql://<user>:<password>@<host>:<port>/<database>

llm:
  enabled: true
  provider: heuristic
  timeout_ms: 80000

branch:
  enabled: true
  run_actual: true
  baseline_testing_enabled: true
  max_branches: 20
  strategy: boundary
  diagnose: false

report:
  enabled: true
