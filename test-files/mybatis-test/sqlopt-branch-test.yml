# SQL Optimizer 配置 - 分支推断测试（限制分支数）
config_version: v1

project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/mapper/UserMapper.xml

db:
  platform: mysql
  dsn: mysql://<user>:<password>@<host>:<port>/<database>

llm:
  enabled: false
  provider: heuristic
  timeout_ms: 80000

report:
  enabled: false

branch:
  enabled: true
  diagnose: false
  strategy: boundary
  max_branches: 10
