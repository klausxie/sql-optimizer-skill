# SQL Optimizer 配置 - MySQL 测试（单SQL）
config_version: v1

project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/mapper/UserMapper.xml

db:
  platform: mysql
  dsn: mysql://<user>:<password>@<host>:<port>/<database>

llm:
  enabled: true
  provider: heuristic
  timeout_ms: 80000

report:
  enabled: true

branch:
  enabled: true
  diagnose: false
  strategy: boundary
  max_branches: 10
