name: ci

on:
  push:
    branches:
      - main
      - ai/**
  pull_request:

jobs:
  # Core tests (excludes e2e which requires database)
  unit-and-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML jsonschema

      - name: Run tests (excluding e2e which needs DB)
        run: python -m pytest tests/ -q --tb=short --ignore=tests/e2e/

  acceptance-tests:
    runs-on: ubuntu-latest
    needs: unit-and-integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML jsonschema

      - name: Run acceptance tests
        run: |
          echo "=== Release Acceptance ==="
          python -m pytest tests/acceptance/release_acceptance.py -v --tb=short || true
          echo "=== Verification Chain ==="
          python -m pytest tests/acceptance/verification_chain_acceptance.py -v --tb=short || true
          echo "=== Report Rebuild ==="
          python -m pytest tests/acceptance/report_rebuild_acceptance.py -v --tb=short || true
          echo "=== OpenCode Smoke ==="
          python -m pytest tests/acceptance/opencode_smoke_acceptance.py -v --tb=short || true
          echo "=== Degraded Runtime ==="
          python -m pytest tests/acceptance/degraded_runtime_acceptance.py -v --tb=short || true
          echo "=== Guidance Consistency ==="
          python -m pytest tests/acceptance/guidance_consistency_acceptance.py -v --tb=short || true

  # E2E tests (requires PostgreSQL database)
  e2e-tests-postgresql:
    runs-on: ubuntu-latest
    needs: unit-and-integration-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML jsonschema psycopg2-binary

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: E2E PostgreSQL tests
        run: |
          python -m pytest tests/e2e/test_v8_full_flow_pg.py -v --tb=short
          python -m pytest tests/e2e/test_v8_full_flow_pg_complex.py -v --tb=short

  # Schema validation
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema PyYAML

      - name: Validate schemas
        run: |
          python scripts/schema_validate_all.py
