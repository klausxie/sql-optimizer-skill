#         1. 禁止查询已删除的订单 (order_status = 'DELETED')
#         2. 隐私字段 (phone, id_card) 必须脱敏
#         3. 日志查询必须带时间范围限制
#
#   # 按规则注入，仅当对应规则匹配时生效
#   by_rule:
#     - rule_id: MISSING_INDEX_IN_WHERE
