# SQL Optimizer 配置文件示例
# 复制此文件到项目根目录并重命名为 sqlopt.yml，然后根据你的环境修改配置

# ============================================================================
# 项目配置
# ============================================================================
project:
  # 项目根目录路径（必填）
  # 相对路径相对于配置文件所在目录，推荐使用 "."
  root_path: .

# ============================================================================
# 扫描配置
# ============================================================================
scan:
  # MyBatis mapper XML 文件的匹配模式（必填）
  # 支持 glob 模式，可以指定多个路径
  mapper_globs:
    - src/main/resources/**/*.xml          # 标准 Maven 项目结构
    # - src/main/resources/mapper/**/*.xml # 自定义 mapper 目录
    # - mybatis/**/*Mapper.xml             # 其他自定义路径

  # Java 扫描器配置
  java_scanner:
    # Java scanner JAR 文件路径（必填）
    # 安装 skill 时会自动设置，通常不需要手动修改
    # 如果看到 __SCANNER_JAR__ 占位符，运行：
    #   python3 install/install_skill.py --project <your_project>
    jar_path: __SCANNER_JAR__

  # 类解析配置（可选）
  class_resolution:
    # 解析模式：tolerant（容错）或 strict（严格）
    # tolerant: 允许部分类解析失败，适合大多数项目
    # strict: 要求所有类都能解析，适合严格的生产环境
    mode: tolerant

    # 启用 classpath 探测（推荐开启）
    # 自动查找项目依赖的 JAR 文件
    enable_classpath_probe: true

    # 启用类型清理（推荐开启）
    # 自动处理泛型和复杂类型
    enable_type_sanitize: true

    # 启用 statement 级别恢复（推荐开启）
    # 单个 statement 解析失败不影响其他 statement
    statement_level_recovery: true

    # 最小成功率（0.0-1.0）
    # 如果成功解析的 statement 比例低于此值，扫描失败
    min_success_ratio: 0.9

# ============================================================================
# 数据库配置
# ============================================================================
db:
  # 数据库平台（必填）
  # 支持：postgresql, mysql
  platform: postgresql

  # 数据库连接字符串（必填）
  # PostgreSQL 格式：postgresql://user:password@host:port/database?options
  # MySQL 格式：mysql://user:password@host:port/database?options
  dsn: postgresql://<user>:<password>@127.0.0.1:5432/<database>?sslmode=disable

  # 示例：
  # dsn: postgresql://myuser:mypass@localhost:5432/mydb?sslmode=disable
  # dsn: mysql://root:password@localhost:3306/mydb?charset=utf8mb4

# ============================================================================
# 验证配置
# ============================================================================
validate:
  # 数据库是否可达（必填）
  # true: 需要连接数据库进行 EXPLAIN 分析
  # false: 跳过数据库验证（仅做静态分析）
  db_reachable: true

  # 验证配置文件（可选）
  # fast: 快速验证，跳过部分检查
  # balanced: 平衡模式（推荐）
  # thorough: 彻底验证，包含所有检查
  validation_profile: balanced

  # 允许数据库不可达时降级（可选）
  # true: 数据库连接失败时继续运行（仅做静态分析）
  # false: 数据库连接失败时终止运行
  allow_db_unreachable_fallback: false

# ============================================================================
# 优化策略配置
# ============================================================================
policy:
  # 是否要求性能提升（可选）
  # true: 只接受有性能提升的优化建议
  # false: 接受所有合理的优化建议（包括代码质量改进）
  require_perf_improvement: false

  # 成本阈值百分比（可选）
  # 只接受成本降低超过此百分比的优化
  # 0 表示接受任何成本降低
  cost_threshold_pct: 0

  # 允许顺序扫描的行数阈值（可选）
  # 如果表行数低于此值，允许顺序扫描
  # 0 表示不允许顺序扫描
  allow_seq_scan_if_rows_below: 0

  # 语义严格模式（可选）
  # true: 要求优化后的 SQL 语义完全一致
  # false: 允许语义等价但不完全一致的优化
  semantic_strict_mode: true

# ============================================================================
# 运行时配置
# ============================================================================
runtime:
  # 运行时配置文件（可选）
  # fast: 快速模式，减少重试和超时
  # balanced: 平衡模式（推荐）
  # thorough: 彻底模式，增加重试和超时
  profile: balanced

  # 高级配置（通常不需要修改）
  # stage_timeout_ms: 60000        # 单个阶段超时（毫秒）
  # stage_retry_max: 3             # 最大重试次数
  # stage_retry_backoff_ms: 1000   # 重试退避时间（毫秒）

# ============================================================================
# 补丁应用配置
# ============================================================================
apply:
  # 应用模式（可选）
  # PATCH_ONLY: 只生成补丁文件，不修改源文件（推荐）
  # APPLY_IN_PLACE: 直接修改源文件（危险！请先备份）
  mode: PATCH_ONLY

# ============================================================================
# LLM 配置
# ============================================================================
llm:
  # 是否启用 LLM（必填）
  # true: 使用 LLM 生成优化建议
  # false: 使用启发式规则（不需要 LLM）
  enabled: true

  # LLM 提供商（必填）
  # opencode_run: 使用 opencode 内置 LLM（推荐）
  # direct_openai_compatible: 直连 OpenAI 兼容 API
  # opencode_builtin: 本地内置策略
  # heuristic: 本地启发式策略（不需要 LLM）
  provider: opencode_run

  # LLM 请求超时（毫秒）
  timeout_ms: 80000

  # -------------------------------------------------------------------------
  # 使用 OpenAI 兼容 API 的配置示例
  # -------------------------------------------------------------------------
  # 如果使用 direct_openai_compatible，取消下面的注释并填写：
  #
  # provider: direct_openai_compatible
  #
  # # API 基础 URL（必填）
  # api_base: https://api.openai.com/v1
  #
  # # API 密钥（必填）
  # api_key: sk-your-api-key-here
  #
  # # 模型名称（必填）
  # api_model: gpt-4o-mini
  #
  # # API 请求超时（毫秒）
  # api_timeout_ms: 30000
  #
  # # 自定义 HTTP 头（可选）
  # api_headers:
  #   X-Custom-Header: value
  #   Authorization: Bearer additional-token

  # -------------------------------------------------------------------------
  # 其他 LLM 提供商示例
  # -------------------------------------------------------------------------
  #
  # Azure OpenAI:
  # provider: direct_openai_compatible
  # api_base: https://your-resource.openai.azure.com/openai/deployments/your-deployment
  # api_key: your-azure-key
  # api_model: gpt-4
  # api_headers:
  #   api-version: "2023-05-15"
  #
  # 本地 LLM (Ollama):
  # provider: direct_openai_compatible
  # api_base: http://localhost:11434/v1
  # api_key: ollama  # Ollama 不需要真实 key
  # api_model: llama2
  #
  # 启发式模式（不使用 LLM）:
  # enabled: true
  # provider: heuristic

# ============================================================================
# 高级配置（可选）
# ============================================================================

# 报告配置
# report:
#   enabled: true                    # 是否生成报告
#   include_ops_health: true         # 包含运维健康信息
#   include_topology: true           # 包含拓扑信息

# 补丁生成配置
# patch:
#   template_rewrite:
#     enable_fragment_materialization: false  # 启用片段级模板重写（实验性）

# 扫描高级配置
# scan:
#   enable_fragment_catalog: true    # 启用片段目录（推荐）
#   fragment_catalog_path: scan.fragments.jsonl

# ============================================================================
# 配置验证
# ============================================================================
# 保存配置后，运行以下命令验证配置是否正确：
#   python3 install/doctor.py --project <your_project_path>
#
# 或使用新的配置验证命令（如果可用）：
#   sqlopt-cli validate-config --config sqlopt.yml
