# SQL Optimizer 极简配置模板（v1）
# 复制为项目根目录 sqlopt.yml 后按需修改。
#
# 外部可配置根键仅保留：project / scan / db / llm / report / config_version
# 以下历史键已移除（出现即报错）：
# validate, policy, apply, patch, diagnostics, runtime, verification

config_version: v1

project:
  # 项目根目录，推荐 "."
  root_path: .

scan:
  # MyBatis mapper XML 的 glob 模式
  mapper_globs:
    - src/main/resources/**/*.xml

db:
  # 支持: postgresql | mysql
  platform: postgresql
  # PostgreSQL: postgresql://user:pass@host:5432/db?sslmode=disable
  # MySQL:      mysql://user:pass@host:3306/db
  dsn: postgresql://<user>:<password>@127.0.0.1:5432/<database>?sslmode=disable
  # 可选：非默认 schema/database 名（尤其是 PostgreSQL）
  # schema: public

llm:
  # provider 必填，支持: opencode_run | direct_openai_compatible | opencode_builtin | heuristic
  provider: opencode_run
  enabled: true
  timeout_ms: 80000

  # 仅当 provider=direct_openai_compatible 时必填
  # api_base: https://api.openai.com/v1
  # api_key: sk-xxx
  # api_model: gpt-4o-mini
  # api_timeout_ms: 30000
  # api_headers:
  #   x-env: prod

report:
  enabled: true

# =============================================
# 可选：自定义规则配置
# =============================================
# 详细规则定义示例见 templates/sqlopt-rules.example.yml

# 方式一：引用外部规则文件
# rules:
#   enabled: true
#   custom_rules_path: "./sqlopt-rules.yml"

# 方式二：内联自定义规则
# rules:
#   enabled: true
#   custom_rules:
#     - id: MY_CUSTOM_RULE
#       severity: warn
#       category: performance
#       message: "自定义规则消息"
#       match:
#         sql_contains: "PATTERN"
#       action:
#         suggestion: "优化建议"

# 方式三：控制内置规则启用状态
# rules:
#   builtin_rules:
#     DOLLAR_SUBSTITUTION: true      # 启用
#     SELECT_STAR: false              # 禁用
#     FULL_SCAN_RISK: true

# =============================================
