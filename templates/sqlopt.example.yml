# SQL Optimizer 配置模板（v1）
# 复制为项目根目录 sqlopt.yml 后按需修改

config_version: v1

project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/**/*.xml

db:
  platform: postgresql
  # PostgreSQL: postgresql://user:pass@host:5432/db?sslmode=disable
  # MySQL:      mysql://user:pass@host:3306/db
  dsn: postgresql://<user>:<password>@127.0.0.1:5432/<database>?sslmode=disable

llm:
  provider: opencode_run
  enabled: true
  timeout_ms: 80000

# validate:
#   allow_db_unreachable_fallback: false  # 默认不允许自动fallback，需显式配置true启用

report:
  enabled: true

# === 可选配置 ===

# rules: 自定义规则
# prompt_injections: LLM Prompt 注入
# 详细示例见 templates/sqlopt-rules.example.yml
