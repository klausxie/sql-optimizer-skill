# SQL Optimizer - Lint Rule Index
# This file provides AI-readable rule overview for code review

[[rules]]
id = "NAMING-001"
category = "naming"
severity = "error"
languages = ["python"]
description = "Use snake_case for functions and variables"

[[rules]]
id = "NAMING-002"
category = "naming"
severity = "error"
languages = ["python"]
description = "Use PascalCase for classes and exceptions"

[[rules]]
id = "NAMING-003"
category = "naming"
severity = "error"
languages = ["python"]
description = "Use UPPER_CASE for constants"

[[rules]]
id = "NAMING-004"
category = "naming"
severity = "warn"
languages = ["python"]
description = "Avoid single-letter variables (except loop indices)"

[[rules]]
id = "ERROR-001"
category = "error-handling"
severity = "error"
languages = ["python"]
description = "No bare try-except (must catch specific exceptions)"

[[rules]]
id = "ERROR-002"
category = "error-handling"
severity = "error"
languages = ["python"]
description = "No empty catch blocks"

[[rules]]
id = "ERROR-003"
category = "error-handling"
severity = "warn"
languages = ["python"]
description = "Use specific exception types, not bare Exception"

[[rules]]
id = "ERROR-004"
category = "error-handling"
severity = "error"
languages = ["python"]
description = "Errors must be logged or propagated"

[[rules]]
id = "IMPORT-001"
category = "imports"
severity = "error"
languages = ["python"]
description = "No wildcard imports (from X import *)"

[[rules]]
id = "IMPORT-002"
category = "imports"
severity = "error"
languages = ["python"]
description = "No circular dependencies"

[[rules]]
id = "IMPORT-003"
category = "imports"
severity = "warn"
languages = ["python"]
description = "Sort imports with isort"

[[rules]]
id = "IMPORT-004"
category = "imports"
severity = "warn"
languages = ["python"]
description = "No unused imports"

[[rules]]
id = "SECURITY-001"
category = "security"
severity = "error"
languages = ["python"]
description = "No hardcoded credentials or secrets"

[[rules]]
id = "SECURITY-002"
category = "security"
severity = "error"
languages = ["python"]
description = "Use parameterized queries (no SQL string concatenation)"

[[rules]]
id = "SECURITY-003"
category = "security"
severity = "error"
languages = ["python"]
description = "No eval() with user input"

[[rules]]
id = "SECURITY-004"
category = "security"
severity = "warn"
languages = ["python"]
description = "Validate external input"

[[rules]]
id = "RET-001"
category = "return-consistency"
severity = "error"
languages = ["python"]
description = "Function return types must be consistent across all branches"

[[rules]]
id = "RET-002"
category = "return-consistency"
severity = "warn"
languages = ["python"]
description = "Multiple return statements may indicate inconsistent return types"

[[rules]]
id = "LOG-001"
category = "logging"
severity = "warn"
languages = ["python"]
description = "Use logging module instead of print() for application logs"

[[rules]]
id = "LOG-002"
category = "logging"
severity = "error"
languages = ["python"]
description = "Must use a proper logger instance"

[[rules]]
id = "LOG-003"
category = "logging"
severity = "error"
languages = ["python"]
description = "Use logger.error() instead of print() in except blocks"

[[rules]]
id = "LOG-004"
category = "logging"
severity = "warn"
languages = ["python"]
description = "Use f-strings or % formatting for log messages"

[[rules]]
id = "CLASS-001"
category = "class-design"
severity = "warn"
languages = ["python"]
description = "Methods that don't access instance (self) should be staticmethods or classmethods"

[[rules]]
id = "CLASS-002"
category = "class-design"
severity = "warn"
languages = ["python"]
description = "Methods should follow order: __new__ -> __init__ -> __post_init__ -> __x__ -> @property -> @staticmethod -> @classmethod -> public -> _protected -> __private"

[[rules]]
id = "EXIT-001"
category = "exit-conventions"
severity = "error"
languages = ["python"]
description = "sys.exit() should only be used in main entry points"

[[rules]]
id = "EXIT-002"
category = "exit-conventions"
severity = "error"
languages = ["python"]
description = "SystemExit should only be raised in main entry points"
