config_version: v1
db_platform: postgresql
db_host: localhost
db_port: 5432
db_name: sqlopt
db_user: postgres
db_password: postgres

# ----------------------------------------------------------------------
# 数据库连接扩展选项 (db_connect_options)
# PostgreSQL 常用: options, connect_timeout, sslmode
# MySQL 常用: connect_timeout, read_timeout, write_timeout
# 示例:
#   PostgreSQL:  options: "-c search_path=myschema"
#   MySQL:       connect_timeout: 30
# ----------------------------------------------------------------------
# db_connect_options:
#   options: "-c search_path=public"
#   connect_timeout: 10

llm_provider: opencode_run
llm_enabled: true
project_root_path: .
scan_mapper_globs:
  - "tests/real/mybatis-test/src/main/resources/mapper/UserMapper.xml"

concurrency:
  enabled: false
  max_workers: 1
