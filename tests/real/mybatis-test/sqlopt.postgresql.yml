config_version: v1
db_platform: postgresql
db_host: localhost
db_port: 5432
db_name: postgres
db_user: postgres
db_password: postgres
db_connect_options:
  # PG: sets default search_path (equivalent to currentSchema in some DBs)
  options: "-c search_path=myschema"
  # PG: connection timeout in seconds
  connect_timeout: 10
llm_provider: mock
llm_enabled: true
project_root_path: tests/real/mybatis-test
scan_mapper_globs:
  - "src/main/resources/mapper/*.xml"
