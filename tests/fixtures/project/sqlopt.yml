project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/**/*.xml
  max_variants_per_statement: 3
  java_scanner:
    jar_path: ../../../java/scan-agent/target/scan-agent-1.0.0.jar


db:
  platform: postgresql
  dsn: postgresql://postgres:Aa28012801@127.0.0.1:5432/postgres?sslmode=disable
  schema: public

validate:
  db_reachable: true
  validation_profile: balanced
  allow_db_unreachable_fallback: false

apply:
  mode: APPLY_IN_PLACE

policy:
  require_perf_improvement: false
  cost_threshold_pct: 0
  allow_seq_scan_if_rows_below: 0
  semantic_strict_mode: true

runtime:
  profile: balanced
  stage_timeout_ms:
    preflight: 12000
    scan: 180000
    optimize: 600000
    validate: 300000
    apply: 120000
    report: 60000
  stage_retry_max:
    scan: 1
    optimize: 1
    validate: 1
    apply: 1
    report: 1
  stage_retry_backoff_ms: 1000

llm:
  enabled: true
  provider: direct_openai_compatible
  timeout_ms: 80000
  api_base: https://api.deepseek.com/v1
  api_key: sk-56f90dbbfd6e44aab99fa2f5f04037a8
  api_model: deepseek-chat
  api_timeout_ms: 30000
