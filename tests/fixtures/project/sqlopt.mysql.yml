project:
  root_path: .

scan:
  mapper_globs:
    - src/main/resources/**/*.xml

db:
  platform: mysql
  dsn: mysql://<user>:<password>@<host>:<port>/<database>

llm:
  enabled: true
  provider: direct_openai_compatible
  timeout_ms: 80000
  api_base: https://api.deepseek.com/v1
  api_key: <api_key>
  api_model: deepseek-chat
  api_timeout_ms: 30000

report:
  enabled: true
