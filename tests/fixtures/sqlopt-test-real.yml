# Test configuration for V9 pipeline with real MyBatis XML
# Uses PostgreSQL at 100.101.41.123:5432

config_version: v1

project:
  root_path: tests/real/mybatis-test

scan:
  mapper_globs:
    - src/main/resources/mapper/**/*.xml

db:
  platform: postgresql
  dsn: postgresql://postgres:postgres@100.101.41.123:5432/postgres

llm:
  enabled: false
  provider: heuristic

branching:
  strategy: all_combinations
  max_branches: 100

optimize:
  provider: heuristic

report:
  enabled: false
